{% extends 'base.html' %}
{% load static %}

{% block titulo %} {{ produto.slug }} {% endblock %}

{% block conteudo %}
<article>
    <header>
        <h1>{{ produto.nome }}</h1>
    </header>
    <div class="grid">
        <div>
            <img src="{% if produto.imagem %}
                         {{ produto.imagem.url }}
                      {% else %}
                         {% static 'imagens/naodisp.png' %}
                      {% endif %}"
                 alt="imagem de {{ produto.nome }}"
            >
        </div>
        <div>
            <p>{{ produto.descricao  }}</p>
            <p>R${{ produto.preco }}</p>
            <button class="secondary">🛒 Adicionar ao Carrinho</button>
        </div>
    </div>
</article>
{% endblock %}
